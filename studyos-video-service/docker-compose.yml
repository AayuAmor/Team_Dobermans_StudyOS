version: "3.9"

services:
  studyos-video-service:
    build: .
    container_name: studyos-video-service
    ports:
      - "8000:8000"
    volumes:
      # Persist downloaded/uploaded files across container restarts
      - ./storage:/app/storage
    environment:
      - WHISPER_MODEL=base
      - MAX_UPLOAD_SIZE_MB=500
      - CORS_ORIGINS=["*"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # Whisper model load takes time
