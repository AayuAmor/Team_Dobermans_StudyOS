version: "3.9"

services:
  studyos-video-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studyos-video-service
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    environment:
      WHISPER_MODEL: "base"
      MAX_UPLOAD_SIZE_MB: "500"
      LOG_LEVEL: "INFO"
      CORS_ORIGINS: '["*"]'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
